<h2>Admin Panel - Bus Pass Requests</h2>

<table border="1">
<tr>
  <th>ID</th>
  <th>User</th>
  <th>Route</th>
  <th>Type</th>
  <th>Status</th>
</tr>

{% for p in passes %}
<tr>
  <td>{{ p[0] }}</td>
  <td>{{ p[1] }}</td>
  <td>{{ p[2] }}</td>
  <td>{{ p[3] }}</td>
  <td>{{ p[4] }}</td>
</tr>
{% endfor %}
</table>
