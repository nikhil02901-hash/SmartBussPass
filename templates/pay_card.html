{% extends "base.html" %}
{% block content %}
<div class="card pad">
  <div class="h1">Card Payment (Demo)</div>
  <p class="muted">Amount: ₹{{ amount }} | Pass ID: {{ pass_id }}</p>

  <form method="post" style="margin-top:14px;max-width:520px;">
    <label>Card Number</label>
    <input class="input" placeholder="1234 5678 9012 3456" required />
    <div class="grid cols-2" style="margin-top:10px;">
      <div>
        <label>Expiry</label>
        <input class="input" placeholder="MM/YY" required />
      </div>
      <div>
        <label>CVV</label>
        <input class="input" placeholder="***" required />
      </div>
    </div>
    <label style="margin-top:10px;display:block;">Name on Card</label>
    <input class="input" placeholder="Your Name" required />
    <button class="btn primary" style="margin-top:12px;">Pay (Simulate Success)</button>
  </form>

  <p class="muted" style="margin-top:12px;">This is a demo payment screen. No card data is stored.</p>
</div>
{% endblock %}
