{% extends "base.html" %}
{% block content %}
<div class="card pad">
  <h2 class="h1">EMI Payment</h2>
  <p class="muted">Choose EMI duration (3/6/12 months). Amount: ₹{{ amount }}</p>

  <form method="post">
    <label class="muted">EMI Months</label>
    <select class="input" name="emi_months" required>
      <option value="3">3 Months</option>
      <option value="6">6 Months</option>
      <option value="12">12 Months</option>
    </select>

    <button class="btn primary" style="margin-top:12px;">Activate EMI</button>
  </form>
</div>
{% endblock %}
