{% extends "base.html" %}
{% block content %}
<div class="card pad">
  <div class="h1">Cash Payment (Demo)</div>
  <p class="muted">Amount: ₹{{ amount }} | Pass ID: {{ pass_id }}</p>

  <form method="post" style="margin-top:14px;">
    <p class="muted">Click confirm to mark this pass as Paid (for demo).</p>
    <button class="btn good">Confirm Cash Paid</button>
  </form>
</div>
{% endblock %}
