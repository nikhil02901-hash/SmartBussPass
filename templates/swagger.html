
{% extends "base.html" %}
{% block content %}
<div class="card pad">
  <div class="h1">API Documentation</div>
  <div class="muted">Swagger UI powered by OpenAPI spec generated by the app.</div>
  <div style="margin-top:14px" class="card" style="overflow:hidden">
    <div id="swagger-ui"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
window.onload = () => {
  SwaggerUIBundle({
    url: "{{ url_for('openapi_json') }}",
    dom_id: "#swagger-ui",
    presets: [SwaggerUIBundle.presets.apis],
    layout: "BaseLayout"
  });
};
</script>
{% endblock %}
