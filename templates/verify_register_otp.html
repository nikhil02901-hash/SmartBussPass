{% extends "base.html" %}
{% block content %}
<div class="card pad">
  <h2 class="h1">Verify OTP</h2>
  <p class="muted">We sent an OTP to your email (demo). Enter it to complete registration.</p>
  <form method="post">
    <input class="input" name="otp" placeholder="Enter 6-digit OTP" required>
    <button class="btn primary" style="margin-top:12px;">Verify</button>
  </form>
</div>
{% endblock %}
